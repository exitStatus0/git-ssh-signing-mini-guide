<!doctype html>
<html lang="{{ page.lang | default: 'en' }}">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>
            {% if page.title and page.title != "Home" %}{{ page.title }} — {{ site.title }}{% else
            %}{{ site.title }}{% endif %}
        </title>
        <meta name="description" content="{{ page.description | default: site.description }}" />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            html {
                font-size: 16px;
                scroll-behavior: smooth;
            }

            body {
                font-family:
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    Noto Sans,
                    Helvetica,
                    Arial,
                    sans-serif;
                color: #1f2328;
                line-height: 1.6;
                background: #ffffff;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
            }

            /* ── Header ── */
            .site-header {
                background: #0d1117;
                padding: 0 1.5rem;
                position: sticky;
                top: 0;
                z-index: 100;
                border-bottom: 1px solid #21262d;
            }

            .header-inner {
                max-width: 1080px;
                margin: 0 auto;
                display: flex;
                align-items: center;
                justify-content: space-between;
                height: 56px;
            }

            .site-title {
                font-size: 1rem;
                font-weight: 600;
                color: #f0f6fc;
                text-decoration: none;
                white-space: nowrap;
            }

            .site-title:hover {
                color: #58a6ff;
            }

            .site-nav {
                display: flex;
                align-items: center;
                gap: 1.25rem;
            }

            .site-nav a {
                color: #8b949e;
                text-decoration: none;
                font-size: 0.875rem;
                font-weight: 500;
                transition: color 0.15s;
            }

            .site-nav a:hover {
                color: #f0f6fc;
            }

            /* ── Main ── */
            main {
                flex: 1;
                padding: 2.5rem 1.5rem;
            }
            .content {
                max-width: 860px;
                margin: 0 auto;
            }

            /* ── Typography ── */
            h1,
            h2,
            h3,
            h4,
            h5,
            h6 {
                color: #1f2328;
                font-weight: 600;
                margin-top: 2rem;
                margin-bottom: 0.75rem;
                line-height: 1.25;
            }

            h1 {
                font-size: 2rem;
                padding-bottom: 0.4rem;
                border-bottom: 1px solid #d1d9e0;
            }

            h2 {
                font-size: 1.5rem;
                padding-bottom: 0.3rem;
                border-bottom: 1px solid #d1d9e0;
            }

            h3 {
                font-size: 1.25rem;
            }
            h4 {
                font-size: 1rem;
            }

            p {
                margin-bottom: 1rem;
            }

            a {
                color: #0969da;
                text-decoration: none;
            }
            a:hover {
                text-decoration: underline;
            }

            strong {
                font-weight: 600;
            }

            ul,
            ol {
                margin-bottom: 1rem;
                padding-left: 2rem;
            }
            li {
                margin-bottom: 0.25rem;
            }
            li > ul,
            li > ol {
                margin-bottom: 0;
            }

            img {
                max-width: 100%;
                border-radius: 6px;
            }

            /* ── Code ── */
            code {
                font-family:
                    ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono",
                    monospace;
                font-size: 0.85em;
                background: #eff1f3;
                padding: 0.15em 0.4em;
                border-radius: 6px;
            }

            pre {
                background: #24292f;
                color: #e6edf3;
                padding: 1rem 1.25rem;
                border-radius: 6px;
                overflow-x: auto;
                margin-bottom: 1.25rem;
                line-height: 1.5;
            }

            pre code {
                background: none;
                padding: 0;
                color: inherit;
                font-size: 0.85rem;
                border-radius: 0;
            }

            /* ── Blockquotes ── */
            blockquote {
                border-left: 3px solid #0969da;
                padding: 0.5rem 1rem;
                margin: 1rem 0;
                color: #59636e;
            }

            blockquote p {
                margin-bottom: 0;
            }

            /* ── HR ── */
            hr {
                border: none;
                height: 1px;
                background: #d1d9e0;
                margin: 2rem 0;
            }

            /* ── Tables ── */
            table {
                border-collapse: collapse;
                width: 100%;
                margin-bottom: 1.25rem;
            }

            th,
            td {
                border: 1px solid #d1d9e0;
                padding: 0.5rem 0.75rem;
                text-align: left;
            }

            th {
                background: #f6f8fa;
                font-weight: 600;
            }

            /* ── Hero (home page) ── */
            .hero {
                text-align: center;
                padding: 3.5rem 1.5rem;
                margin-bottom: 2.5rem;
                background: linear-gradient(145deg, #0d1117 0%, #161b22 100%);
                border-radius: 10px;
                border: 1px solid #30363d;
            }

            .hero h1 {
                color: #f0f6fc;
                border: none;
                font-size: 2.25rem;
                margin: 0 0 0.75rem;
                padding: 0;
            }

            .hero .tagline {
                color: #8b949e;
                font-size: 1.1rem;
                max-width: 560px;
                margin: 0 auto 1.25rem;
                line-height: 1.5;
            }

            .verified-pill {
                display: inline-flex;
                align-items: center;
                gap: 0.35rem;
                background: rgba(26, 127, 55, 0.15);
                color: #3fb950;
                padding: 0.3rem 0.9rem;
                border-radius: 999px;
                font-size: 0.8rem;
                font-weight: 600;
                border: 1px solid rgba(63, 185, 80, 0.25);
                margin-bottom: 1.25rem;
            }

            .verified-pill svg {
                flex-shrink: 0;
            }

            /* ── Cards ── */
            .cards {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
                gap: 1rem;
                margin: 1.5rem 0 2rem;
            }

            .card {
                border: 1px solid #d1d9e0;
                border-radius: 8px;
                padding: 1.5rem;
                background: #ffffff;
                transition:
                    border-color 0.15s,
                    box-shadow 0.15s;
            }

            .card:hover {
                border-color: #0969da;
                box-shadow: 0 1px 6px rgba(9, 105, 218, 0.12);
            }

            .card-label {
                display: inline-block;
                font-size: 0.7rem;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                color: #656d76;
                margin-bottom: 0.5rem;
            }

            .card h3 {
                margin: 0 0 0.5rem;
                font-size: 1.1rem;
            }

            .card p {
                color: #59636e;
                font-size: 0.9rem;
                margin-bottom: 1.25rem;
                line-height: 1.5;
            }

            .btn {
                display: inline-block;
                padding: 0.45rem 1rem;
                border-radius: 6px;
                font-size: 0.85rem;
                font-weight: 500;
                text-decoration: none;
                transition: background 0.15s;
            }

            .btn:hover {
                text-decoration: none;
            }

            .btn-primary {
                background: #238636;
                color: #ffffff;
                border: 1px solid rgba(27, 31, 36, 0.15);
            }

            .btn-primary:hover {
                background: #2ea043;
            }

            .btn-outline {
                background: #f6f8fa;
                color: #24292f;
                border: 1px solid #d1d9e0;
            }

            .btn-outline:hover {
                background: #eaeef2;
            }

            /* ── Section headings on home ── */
            .section-title {
                font-size: 1.35rem;
                font-weight: 600;
                margin: 2.5rem 0 0.5rem;
                padding-bottom: 0.35rem;
                border-bottom: 1px solid #d1d9e0;
            }

            .section-title:first-of-type {
                margin-top: 0;
            }

            /* ── Feature list ── */
            .features {
                list-style: none;
                padding: 0;
                margin: 1rem 0 2rem;
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
                gap: 0.6rem;
            }

            .features li {
                padding: 0.5rem 0.75rem;
                background: #f6f8fa;
                border-radius: 6px;
                font-size: 0.9rem;
                color: #1f2328;
                margin: 0;
            }

            .features li::before {
                content: "";
                display: inline-block;
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: #0969da;
                margin-right: 0.6rem;
                vertical-align: middle;
            }

            /* ── Mentoring banner ── */
            .mentoring-banner {
                border: 1px solid #d1d9e0;
                border-left: 4px solid #0969da;
                border-radius: 6px;
                padding: 1.25rem 1.5rem;
                margin: 2rem 0;
                background: #f6f8fa;
            }

            .mentoring-banner h3 {
                margin: 0 0 0.4rem;
                font-size: 1.05rem;
            }

            .mentoring-banner p {
                color: #59636e;
                font-size: 0.9rem;
                margin-bottom: 0.75rem;
            }

            /* ── Footer ── */
            .site-footer {
                background: #f6f8fa;
                border-top: 1px solid #d1d9e0;
                padding: 1.75rem 1.5rem;
                text-align: center;
                font-size: 0.8rem;
                color: #656d76;
            }

            .site-footer a {
                color: #0969da;
            }
            .site-footer p {
                margin-bottom: 0.25rem;
            }

            /* ── Responsive ── */
            @media (max-width: 700px) {
                .header-inner {
                    height: auto;
                    padding: 0.75rem 0;
                    flex-wrap: wrap;
                    gap: 0.5rem;
                }
                .site-nav {
                    gap: 1rem;
                }
                .hero {
                    padding: 2.5rem 1rem;
                }
                .hero h1 {
                    font-size: 1.75rem;
                }
                main {
                    padding: 1.5rem 1rem;
                }
                .cards {
                    grid-template-columns: 1fr;
                }
                .features {
                    grid-template-columns: 1fr;
                }
            }
        </style>
    </head>
    <body>
        <header class="site-header">
            <div class="header-inner">
                <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
                <nav class="site-nav">
                    <a href="{{ '/en/git-ssh-signing-mini-course/' | relative_url }}">EN Guide</a>
                    <a href="{{ '/other/git-ssh-signing-mini-course-other/' | relative_url }}"
                        >Other Guide</a
                    >
                    <a href="{{ '/mentoring/' | relative_url }}">Mentoring</a>
                </nav>
            </div>
        </header>

        <main>
            <div class="content">{{ content }}</div>
        </main>

        <footer class="site-footer">
            <p><a href="{{ site.github_url }}">View on GitHub</a></p>
            <p>MIT License</p>
        </footer>
    </body>
</html>
